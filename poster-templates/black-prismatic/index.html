<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1440, initial-scale=1.0" />
    <title>黑底炫彩版海报模板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="poster-shell">
      <img class="poster-base" data-role="base-image" alt="" />
      <div class="poster-vignette"></div>
      <div class="poster-top-glow"></div>

      <section class="brand-cluster">
        <div class="brand-chip">
          <img class="brand-logo" data-role="logo-image" alt="染色宝" />
          <div class="brand-copy">
            <p class="brand-eyebrow">RANSEBAO</p>
            <h1 class="brand-title">染色宝</h1>
            <p class="brand-subtitle">智能染发解决方案</p>
          </div>
        </div>
      </section>

      <section class="headline-block">
        <p class="headline-kicker" data-role="headline-kicker"></p>
        <h2 class="headline-title" data-role="headline-title"></h2>
        <p class="headline-subtitle" data-role="headline-subtitle"></p>
      </section>

      <section class="footer-grid">
        <article class="value-card">
          <p class="value-index">01</p>
          <h3 class="value-title" data-role="point-1"></h3>
        </article>
        <article class="value-card">
          <p class="value-index">02</p>
          <h3 class="value-title" data-role="point-2"></h3>
        </article>
        <article class="value-card">
          <p class="value-index">03</p>
          <h3 class="value-title" data-role="point-3"></h3>
        </article>
        <article class="value-card">
          <p class="value-index">04</p>
          <h3 class="value-title" data-role="point-4"></h3>
        </article>
      </section>
    </main>

    <script src="./render.js"></script>
  </body>
</html>
